<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>San Map Editor</title>
<style>
:root {
  color-scheme: light;
  --bg: #f4f2ec;
  --ink: #202124;
  --muted: #666a70;
  --line: #c9c3b8;
  --panel: #fbfaf7;
  --accent: #0f766e;
  --mark: #f59e0b;
}
* { box-sizing: border-box; }
body { margin: 0; height: 100vh; overflow: hidden; font-family: "Segoe UI", Arial, sans-serif; color: var(--ink); background: var(--bg); }
#app { display: grid; grid-template-columns: minmax(0, 1fr) 380px; grid-template-rows: 42px minmax(0, 1fr); height: 100vh; }
.toolbar { grid-column: 1 / 3; display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid var(--line); background: var(--panel); }
.toolbar .title { font-weight: 650; margin-right: 10px; white-space: nowrap; }
.toolbar label, .field label { font-size: 12px; color: var(--muted); }
select, input, button { height: 28px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); font: inherit; }
select, input { padding: 0 8px; }
button { padding: 0 10px; cursor: pointer; }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.status { margin-left: auto; color: var(--muted); font-size: 12px; }
#viewport { position: relative; min-width: 0; min-height: 0; background: #1d1b18; }
canvas { width: 100%; height: 100%; display: block; }
.side { min-height: 0; overflow: auto; border-left: 1px solid var(--line); background: var(--panel); padding: 12px; }
.section { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }
.section:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
.section-title { font-size: 12px; font-weight: 650; color: var(--muted); text-transform: uppercase; letter-spacing: 0; margin-bottom: 8px; }
.kv { display: grid; grid-template-columns: 92px 1fr; gap: 6px 10px; font-size: 13px; }
.kv .k { color: var(--muted); }
.record-grid { display: grid; grid-template-columns: 1fr 92px; gap: 6px 8px; align-items: center; font-size: 13px; }
.record-grid span:nth-child(odd) { color: var(--muted); }
.field { display: grid; grid-template-columns: 82px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
.patch-list { font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; color: #343434; }
.resource-controls { display: grid; grid-template-columns: 1fr 92px; gap: 8px; margin-bottom: 8px; }
.resource-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 6px; max-height: 260px; overflow: auto; padding-right: 2px; }
.resource-item { height: 76px; border: 1px solid var(--line); border-radius: 6px; background: #fff; padding: 3px; display: grid; grid-template-rows: 1fr 16px; align-items: center; justify-items: center; }
.resource-item.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(15,118,110,.18); }
.resource-thumb { background-color: #111; background-repeat: no-repeat; image-rendering: pixelated; }
.resource-label { font-size: 11px; color: var(--muted); line-height: 14px; }
.minimap-wrap { position: relative; border: 1px solid var(--line); background: #111; }
#minimap { height: 150px; }
@media (max-width: 980px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr) 340px; }
  .toolbar { grid-column: 1; flex-wrap: wrap; height: auto; }
  .side { border-left: 0; border-top: 1px solid var(--line); }
}
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <div class="title" id="stageTitle">stage</div>
    <label>Tool</label>
    <select id="tool"><option value="inspect">Inspect</option><option value="paint">Paint</option><option value="pan">Pan</option></select>
    <label>Layer</label>
    <select id="layer"><option value="acwx">acwx</option><option value="acwy">acwy</option><option value="acwz">acwz</option></select>
    <label>Value</label>
    <input id="brush" type="number" value="0" step="1">
    <button id="resetView">Reset</button>
    <button id="exportPatch" class="primary">Export patch</button>
    <span class="status" id="status">Loading</span>
  </div>
  <div id="viewport"><canvas id="canvas"></canvas></div>
  <aside class="side">
    <div class="section">
      <div class="section-title">Stage</div>
      <div class="kv" id="stageInfo"></div>
    </div>
    <div class="section">
      <div class="section-title">Minimap</div>
      <div class="minimap-wrap"><canvas id="minimap"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title">Resources</div>
      <div class="resource-controls"><input id="resourceFilter" placeholder="index"><button id="clearFilter">Clear</button></div>
      <div class="resource-list" id="resourceList"></div>
    </div>
    <div class="section">
      <div class="section-title">Cell</div>
      <div class="kv" id="cellInfo"></div>
    </div>
    <div class="section">
      <div class="section-title">Record</div>
      <div class="record-grid" id="recordGrid"></div>
    </div>
    <div class="section">
      <div class="field"><label>Patch count</label><input id="patchCount" value="0" readonly></div>
      <div class="patch-list" id="patchList"></div>
    </div>
  </aside>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const miniCtx = mini.getContext('2d');
const state = {
  meta: null,
  resources: null,
  image: null,
  minimap: null,
  selected: null,
  selectedResource: { acwx: null, acwy: null, acwz: null },
  transform: { x: 24, y: 24, scale: 0.8 },
  dragging: false,
  dragStart: null,
  patches: new Map(),
};
const els = {
  status: document.getElementById('status'), title: document.getElementById('stageTitle'), stageInfo: document.getElementById('stageInfo'),
  cellInfo: document.getElementById('cellInfo'), recordGrid: document.getElementById('recordGrid'), tool: document.getElementById('tool'),
  layer: document.getElementById('layer'), brush: document.getElementById('brush'), patchCount: document.getElementById('patchCount'),
  patchList: document.getElementById('patchList'), resourceList: document.getElementById('resourceList'), resourceFilter: document.getElementById('resourceFilter'),
};
function fieldIndex(name) { return state.meta.fields.indexOf(name); }
function recordAt(cell) { return state.meta.records[cell.row * state.meta.width + cell.col]; }
function cellKey(cell) { return `${cell.col},${cell.row}`; }
function cellToWorld(col, row) { const [ox, oy] = state.meta.origin; return { x: ox + col * 40 + (row & 1 ? 20 : 0), y: oy + row * 10 }; }
function worldToCell(x, y) {
  const [ox, oy] = state.meta.origin;
  const row = Math.floor((y - oy) / 10);
  const col = Math.floor((x - ox - (row & 1 ? 20 : 0)) / 40);
  if (col < 0 || row < 0 || col >= state.meta.width || row >= state.meta.height) return null;
  return { col, row };
}
function clientToWorld(ev) { const rect = canvas.getBoundingClientRect(); return { x: (ev.clientX - rect.left - state.transform.x) / state.transform.scale, y: (ev.clientY - rect.top - state.transform.y) / state.transform.scale }; }
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect(); const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr)); canvas.height = Math.max(1, Math.floor(rect.height * dpr)); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const mrect = mini.getBoundingClientRect(); mini.width = Math.max(1, Math.floor(mrect.width * dpr)); mini.height = Math.max(1, Math.floor(mrect.height * dpr)); miniCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw(); drawMinimap();
}
function diamondPath(col, row) { const p = cellToWorld(col, row); ctx.beginPath(); ctx.moveTo(p.x + 20, p.y); ctx.lineTo(p.x + 40, p.y + 10); ctx.lineTo(p.x + 20, p.y + 20); ctx.lineTo(p.x, p.y + 10); ctx.closePath(); }
function draw() {
  if (!state.image) return;
  const rect = canvas.getBoundingClientRect(); ctx.save(); ctx.clearRect(0, 0, rect.width, rect.height); ctx.translate(state.transform.x, state.transform.y); ctx.scale(state.transform.scale, state.transform.scale); ctx.imageSmoothingEnabled = false; ctx.drawImage(state.image, 0, 0); ctx.lineWidth = 1 / state.transform.scale;
  for (const patch of state.patches.values()) { diamondPath(patch.x, patch.y); ctx.fillStyle = 'rgba(15,118,110,0.22)'; ctx.fill(); ctx.strokeStyle = 'rgba(15,118,110,0.9)'; ctx.stroke(); }
  if (state.selected) { diamondPath(state.selected.col, state.selected.row); ctx.fillStyle = 'rgba(245,158,11,0.18)'; ctx.fill(); ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2 / state.transform.scale; ctx.stroke(); }
  ctx.restore(); drawMinimap();
}
function drawMinimap() {
  if (!state.minimap) return;
  const rect = mini.getBoundingClientRect(); miniCtx.clearRect(0, 0, rect.width, rect.height);
  const scale = Math.min(rect.width / state.minimap.width, rect.height / state.minimap.height);
  const w = state.minimap.width * scale; const h = state.minimap.height * scale; const ox = (rect.width - w) / 2; const oy = (rect.height - h) / 2;
  miniCtx.imageSmoothingEnabled = true; miniCtx.drawImage(state.minimap, ox, oy, w, h);
  const mainRect = canvas.getBoundingClientRect();
  const view = { x: -state.transform.x / state.transform.scale, y: -state.transform.y / state.transform.scale, w: mainRect.width / state.transform.scale, h: mainRect.height / state.transform.scale };
  miniCtx.strokeStyle = '#f59e0b'; miniCtx.lineWidth = 2; miniCtx.strokeRect(ox + view.x / state.image.width * w, oy + view.y / state.image.height * h, view.w / state.image.width * w, view.h / state.image.height * h);
}
function setPairs(node, pairs) { node.innerHTML = ''; for (const [k, v] of pairs) { const a = document.createElement('div'); a.className = 'k'; a.textContent = k; const b = document.createElement('div'); b.textContent = v; node.append(a, b); } }
function refreshSide() {
  const m = state.meta; setPairs(els.stageInfo, [['Stage', m.stage], ['Cells', `${m.width} x ${m.height}`], ['Layout', m.layout], ['Palette', m.palette]]);
  if (!state.selected) { setPairs(els.cellInfo, [['Cell', '-'], ['Index', '-']]); els.recordGrid.innerHTML = ''; return; }
  const cell = state.selected; const idx = cell.row * m.width + cell.col; const rec = recordAt(cell); setPairs(els.cellInfo, [['Cell', `${cell.col}, ${cell.row}`], ['Index', idx]]);
  els.recordGrid.innerHTML = ''; m.fields.forEach((name, i) => { const k = document.createElement('span'); k.textContent = name; const v = document.createElement('span'); v.textContent = rec[i]; els.recordGrid.append(k, v); });
  els.brush.value = rec[fieldIndex(els.layer.value)] ?? 0;
}
function refreshPatches() { els.patchCount.value = state.patches.size; els.patchList.textContent = [...state.patches.values()].slice(-12).map(p => `${p.x},${p.y} ${p.field}: ${p.before} -> ${p.after}`).join('\n'); els.status.textContent = state.patches.size ? 'Dirty' : 'Ready'; }
function renderResourceList() {
  if (!state.resources) return;
  const layer = els.layer.value;
  const info = state.resources.layers[layer];
  const filter = els.resourceFilter.value.trim();
  const selected = state.selectedResource[layer];
  const entries = info.entries.filter(e => !filter || String(e.index).includes(filter)).slice(0, 240);
  els.resourceList.textContent = '';
  let cursor = 0;
  function addChunk() {
    const frag = document.createDocumentFragment();
    const end = Math.min(cursor + 40, entries.length);
    for (; cursor < end; cursor++) {
      const entry = entries[cursor];
      const button = document.createElement('button');
      button.className = 'resource-item' + (selected === entry.index ? ' selected' : '');
      button.title = `${layer} ${entry.index}`;
      const thumb = document.createElement('div');
      thumb.className = 'resource-thumb';
      thumb.style.width = `${info.tileSize}px`;
      thumb.style.height = `${info.tileSize}px`;
      thumb.style.backgroundImage = `url(${info.image})`;
      thumb.style.backgroundPosition = `-${entry.atlas[0]}px -${entry.atlas[1]}px`;
      const label = document.createElement('div');
      label.className = 'resource-label';
      label.textContent = entry.used ? `${entry.index} (${entry.used})` : entry.index;
      button.append(thumb, label);
      button.addEventListener('click', () => {
        state.selectedResource[layer] = entry.index;
        els.brush.value = entry.index;
        els.tool.value = 'paint';
        renderResourceList();
      });
      frag.append(button);
    }
    els.resourceList.append(frag);
    if (cursor < entries.length) window.setTimeout(addChunk, 0);
  }
  addChunk();
}
function applyPaint(cell) {
  const field = els.layer.value; const fi = fieldIndex(field); if (fi < 0) return; const rec = recordAt(cell); const value = Number.parseInt(els.brush.value, 10); if (!Number.isFinite(value)) return; const before = rec[fi]; if (before === value) return;
  rec[fi] = value; state.patches.set(`${cellKey(cell)}:${field}`, { x: cell.col, y: cell.row, field, before, after: value, minimapDirty: true }); refreshSide(); refreshPatches(); draw();
}
function downloadPatch() { const payload = { format: 'san-editor-patch-v1', stage: state.meta.stage, fields: state.meta.fields, minimap: { dirtyCells: [...state.patches.values()].filter(p => p.minimapDirty).map(p => [p.x, p.y]) }, changes: [...state.patches.values()] }; const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${state.meta.stage}_patch.json`; a.click(); URL.revokeObjectURL(a.href); }
canvas.addEventListener('pointerdown', ev => { canvas.setPointerCapture(ev.pointerId); const world = clientToWorld(ev); const cell = worldToCell(world.x, world.y); const tool = els.tool.value; if (tool === 'pan') { state.dragging = true; state.dragStart = { x: ev.clientX, y: ev.clientY, tx: state.transform.x, ty: state.transform.y }; return; } if (cell) { state.selected = cell; if (tool === 'paint') applyPaint(cell); refreshSide(); draw(); } });
canvas.addEventListener('pointermove', ev => { if (!state.dragging) return; state.transform.x = state.dragStart.tx + ev.clientX - state.dragStart.x; state.transform.y = state.dragStart.ty + ev.clientY - state.dragStart.y; draw(); });
canvas.addEventListener('pointerup', () => { state.dragging = false; });
canvas.addEventListener('wheel', ev => { ev.preventDefault(); const before = clientToWorld(ev); const factor = ev.deltaY < 0 ? 1.12 : 0.89; state.transform.scale = Math.max(0.2, Math.min(5, state.transform.scale * factor)); const rect = canvas.getBoundingClientRect(); state.transform.x = ev.clientX - rect.left - before.x * state.transform.scale; state.transform.y = ev.clientY - rect.top - before.y * state.transform.scale; draw(); }, { passive: false });
mini.addEventListener('pointerdown', ev => { if (!state.minimap || !state.image) return; const rect = mini.getBoundingClientRect(); const scale = Math.min(rect.width / state.minimap.width, rect.height / state.minimap.height); const w = state.minimap.width * scale; const h = state.minimap.height * scale; const ox = (rect.width - w) / 2; const oy = (rect.height - h) / 2; const x = (ev.clientX - rect.left - ox) / w * state.image.width; const y = (ev.clientY - rect.top - oy) / h * state.image.height; const main = canvas.getBoundingClientRect(); state.transform.x = main.width / 2 - x * state.transform.scale; state.transform.y = main.height / 2 - y * state.transform.scale; draw(); });
document.getElementById('resetView').addEventListener('click', () => { state.transform = { x: 24, y: 24, scale: 0.8 }; draw(); });
document.getElementById('exportPatch').addEventListener('click', downloadPatch);
document.getElementById('clearFilter').addEventListener('click', () => { els.resourceFilter.value = ''; renderResourceList(); });
els.layer.addEventListener('change', () => { renderResourceList(); refreshSide(); });
els.resourceFilter.addEventListener('input', renderResourceList);
window.addEventListener('resize', resizeCanvas);
async function loadImage(src) { const image = new Image(); image.src = src; await image.decode(); return image; }
async function boot() {
  state.meta = await fetch('stage.json').then(r => r.json());
  const resourcePromise = fetch(state.meta.resources).then(r => r.json());
  const imagePromise = loadImage(state.meta.image);
  const minimapPromise = loadImage(state.meta.minimap.image);
  state.image = await imagePromise;
  state.minimap = await minimapPromise;
  state.resources = await resourcePromise;
  els.title.textContent = state.meta.stage;
  for (const layer of state.meta.editableLayers) { state.selectedResource[layer] = state.resources.layers[layer]?.entries[0]?.index ?? null; }
  refreshSide(); refreshPatches(); resizeCanvas(); renderResourceList();
}
boot().catch(err => { els.status.textContent = String(err); });
</script>
</body>
</html>
