<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>San Map Editor</title>
<style>
:root {
  color-scheme: light;
  --bg: #f4f2ec;
  --ink: #202124;
  --muted: #666a70;
  --line: #c9c3b8;
  --panel: #fbfaf7;
  --accent: #0f766e;
  --mark: #f59e0b;
}
* { box-sizing: border-box; }
body { margin: 0; height: 100vh; overflow: hidden; font-family: "Segoe UI", Arial, sans-serif; color: var(--ink); background: var(--bg); }
#app { display: grid; grid-template-columns: minmax(0, 1fr) 380px; grid-template-rows: 42px minmax(0, 1fr); height: 100vh; }
.toolbar { grid-column: 1 / 3; display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid var(--line); background: var(--panel); }
.toolbar .title { font-weight: 650; margin-right: 10px; white-space: nowrap; }
.toolbar label, .field label { font-size: 12px; color: var(--muted); }
select, input, button { height: 28px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); font: inherit; }
select, input { padding: 0 8px; }
button { padding: 0 10px; cursor: pointer; }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.status { margin-left: auto; color: var(--muted); font-size: 12px; }
#viewport { position: relative; min-width: 0; min-height: 0; background: #1d1b18; }
canvas { width: 100%; height: 100%; display: block; }
.side { min-height: 0; overflow: auto; border-left: 1px solid var(--line); background: var(--panel); padding: 12px; }
.section { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }
.section:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
.section-title { font-size: 12px; font-weight: 650; color: var(--muted); text-transform: uppercase; letter-spacing: 0; margin-bottom: 8px; }
.kv { display: grid; grid-template-columns: 92px 1fr; gap: 6px 10px; font-size: 13px; }
.kv .k { color: var(--muted); }
.record-grid { display: grid; grid-template-columns: 1fr 92px; gap: 6px 8px; align-items: center; font-size: 13px; }
.record-grid span:nth-child(odd) { color: var(--muted); }
.field { display: grid; grid-template-columns: 82px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
.patch-list { font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; color: #343434; }
.resource-controls { display: grid; grid-template-columns: 1fr 116px 76px; gap: 8px; margin-bottom: 8px; }
.resource-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 6px; max-height: 260px; overflow: auto; padding-right: 2px; }
.resource-item { height: 76px; border: 1px solid var(--line); border-radius: 6px; background: #fff; padding: 3px; display: grid; grid-template-rows: 1fr 16px; align-items: center; justify-items: center; }
.resource-item.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(15,118,110,.18); }
.resource-thumb { background-color: #111; background-repeat: no-repeat; image-rendering: pixelated; }
.resource-label { font-size: 11px; color: var(--muted); line-height: 14px; }
.minimap-wrap { position: relative; border: 1px solid var(--line); background: #111; }
#minimap { height: 150px; }
@media (max-width: 980px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr) 340px; }
  .toolbar { grid-column: 1; flex-wrap: wrap; height: auto; }
  .side { border-left: 0; border-top: 1px solid var(--line); }
}
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <div class="title" id="stageTitle">stage</div>
    <label>Stage</label>
    <select id="stagePicker"><option value="">current</option></select>
    <label>Tool</label>
    <select id="tool" title="查看=只选中格子；绘制=把当前资源写到当前层；平移=拖动地图"><option value="inspect">查看</option><option value="paint">绘制</option><option value="pan">平移</option></select>
    <label>Layer</label>
    <select id="layer"><option value="acwx">acwx</option><option value="acwy">acwy</option><option value="acwz">acwz</option></select>
    <label>Value</label>
    <input id="brush" type="number" value="0" step="1">
    <input id="loadMFile" type="file" accept=".m" hidden>
    <button id="openMFile">Open .m</button>
    <button id="resetView">Reset view</button>
    <button id="undoEdit">Undo</button>
    <button id="resetCell">Reset cell</button>
    <button id="resetAll">Reset all</button>
    <button id="exportPatch" class="primary">Export patch</button>
    <span class="status" id="status">Loading</span>
  </div>
  <div id="viewport"><canvas id="canvas"></canvas></div>
  <aside class="side">
    <div class="section">
      <div class="section-title">Stage</div>
      <div class="kv" id="stageInfo"></div>
    </div>
    <div class="section">
      <div class="section-title">Minimap</div>
      <div class="minimap-wrap"><canvas id="minimap"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title">Resources</div>
      <div class="resource-controls"><input id="resourceFilter" placeholder="index"><select id="resourceSort"><option value="index">按编号</option><option value="used">按使用</option></select><button id="clearFilter">清除</button></div>
      <div class="resource-list" id="resourceList"></div>
    </div>
    <div class="section">
      <div class="section-title">Cell</div>
      <div class="kv" id="cellInfo"></div>
    </div>
    <div class="section">
      <div class="section-title">Record</div>
      <div class="record-grid" id="recordGrid"></div>
    </div>
    <div class="section">
      <div class="field"><label>Patch count</label><input id="patchCount" value="0" readonly></div>
      <div class="patch-list" id="patchList"></div>
    </div>
  </aside>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const miniCtx = mini.getContext('2d');
const state = {
  meta: null,
  resources: null,
  resourceByIndex: {},
  drawImages: {},
  image: null,
  renderCanvas: null,
  renderCtx: null,
  minimap: null,
  selected: null,
  selectedResource: { acwx: null, acwy: null, acwz: null },
  transform: { x: 24, y: 24, scale: 0.8 },
  dragging: false,
  dragStart: null,
  patches: new Map(),
  originalRecords: null,
  undoStack: [],
};
const els = {
  status: document.getElementById('status'), title: document.getElementById('stageTitle'), stageInfo: document.getElementById('stageInfo'),
  cellInfo: document.getElementById('cellInfo'), recordGrid: document.getElementById('recordGrid'), tool: document.getElementById('tool'),
  layer: document.getElementById('layer'), brush: document.getElementById('brush'), patchCount: document.getElementById('patchCount'),
  patchList: document.getElementById('patchList'), resourceList: document.getElementById('resourceList'), resourceFilter: document.getElementById('resourceFilter'),
  resourceSort: document.getElementById('resourceSort'), undoEdit: document.getElementById('undoEdit'), resetCell: document.getElementById('resetCell'), resetAll: document.getElementById('resetAll'),
  openMFile: document.getElementById('openMFile'), loadMFile: document.getElementById('loadMFile'), stagePicker: document.getElementById('stagePicker'),
};
function fieldIndex(name) { return state.meta.fields.indexOf(name); }
function recordIndex(cell) { return cell.row * state.meta.width + cell.col; }
function recordAt(cell) { return state.meta.records[recordIndex(cell)]; }
function cellKey(cell) { return `${cell.col},${cell.row}`; }
function patchKey(cell, field) { return `${cellKey(cell)}:${field}`; }
function cellToWorld(col, row) { const [ox, oy] = state.meta.origin; return { x: ox + col * 40 + (row & 1 ? 20 : 0), y: oy + row * 10 }; }
function displayImage() { return state.renderCanvas || state.image; }
function canvasSizeForMeta(meta = state.meta) { return { width: meta.width * 40 + 20 + 128, height: meta.height * 10 + 20 + 128 }; }
function worldToCell(x, y) {
  const [ox, oy] = state.meta.origin;
  const row = Math.floor((y - oy) / 10);
  const col = Math.floor((x - ox - (row & 1 ? 20 : 0)) / 40);
  if (col < 0 || row < 0 || col >= state.meta.width || row >= state.meta.height) return null;
  return { col, row };
}
function clientToWorld(ev) { const rect = canvas.getBoundingClientRect(); return { x: (ev.clientX - rect.left - state.transform.x) / state.transform.scale, y: (ev.clientY - rect.top - state.transform.y) / state.transform.scale }; }
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect(); const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr)); canvas.height = Math.max(1, Math.floor(rect.height * dpr)); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const mrect = mini.getBoundingClientRect(); mini.width = Math.max(1, Math.floor(mrect.width * dpr)); mini.height = Math.max(1, Math.floor(mrect.height * dpr)); miniCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw(); drawMinimap();
}
function diamondPath(col, row) { const p = cellToWorld(col, row); ctx.beginPath(); ctx.moveTo(p.x + 20, p.y); ctx.lineTo(p.x + 40, p.y + 10); ctx.lineTo(p.x + 20, p.y + 20); ctx.lineTo(p.x, p.y + 10); ctx.closePath(); }
function draw() {
  const image = displayImage();
  if (!image) return;
  const rect = canvas.getBoundingClientRect(); ctx.save(); ctx.clearRect(0, 0, rect.width, rect.height); ctx.translate(state.transform.x, state.transform.y); ctx.scale(state.transform.scale, state.transform.scale); ctx.imageSmoothingEnabled = false; ctx.drawImage(image, 0, 0); ctx.lineWidth = 1 / state.transform.scale;
  for (const patch of state.patches.values()) { diamondPath(patch.x, patch.y); ctx.strokeStyle = 'rgba(15,118,110,0.9)'; ctx.stroke(); }
  if (state.selected) { diamondPath(state.selected.col, state.selected.row); ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2 / state.transform.scale; ctx.stroke(); }
  ctx.restore(); drawMinimap();
}
function drawMinimap() {
  const image = displayImage();
  if (!image) return;
  const source = state.minimap || image;
  const rect = mini.getBoundingClientRect(); miniCtx.clearRect(0, 0, rect.width, rect.height);
  const scale = Math.min(rect.width / source.width, rect.height / source.height);
  const w = source.width * scale; const h = source.height * scale; const ox = (rect.width - w) / 2; const oy = (rect.height - h) / 2;
  miniCtx.imageSmoothingEnabled = true; miniCtx.drawImage(source, ox, oy, w, h);
  const mainRect = canvas.getBoundingClientRect();
  const view = { x: -state.transform.x / state.transform.scale, y: -state.transform.y / state.transform.scale, w: mainRect.width / state.transform.scale, h: mainRect.height / state.transform.scale };
  miniCtx.strokeStyle = '#f59e0b'; miniCtx.lineWidth = 2; miniCtx.strokeRect(ox + view.x / image.width * w, oy + view.y / image.height * h, view.w / image.width * w, view.h / image.height * h);
}
function setPairs(node, pairs) { node.innerHTML = ''; for (const [k, v] of pairs) { const a = document.createElement('div'); a.className = 'k'; a.textContent = k; const b = document.createElement('div'); b.textContent = v; node.append(a, b); } }
function layerStats(layer) {
  const fi = fieldIndex(layer);
  let nonEmpty = 0;
  const unique = new Set();
  for (const rec of state.meta.records) {
    const value = rec[fi];
    if (value !== -1) { nonEmpty++; unique.add(value); }
  }
  return `${nonEmpty} cells / ${unique.size} ids`;
}
function nearbyValues(cell, layer, radius = 3, limit = 5) {
  const fi = fieldIndex(layer);
  const hits = [];
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      const col = cell.col + dx;
      const row = cell.row + dy;
      if (col < 0 || row < 0 || col >= state.meta.width || row >= state.meta.height) continue;
      const value = state.meta.records[row * state.meta.width + col][fi];
      if (value !== -1) hits.push({ value, col, row, dist: Math.abs(dx) + Math.abs(dy) });
    }
  }
  hits.sort((a, b) => a.dist - b.dist || a.row - b.row || a.col - b.col);
  return hits.slice(0, limit).map(h => `${h.value} @ ${h.col},${h.row}`).join(' | ') || '-';
}
function refreshSide() {
  const m = state.meta; setPairs(els.stageInfo, [['Stage', m.stage], ['Cells', `${m.width} x ${m.height}`], ['Layout', m.layout], ['Palette', m.palette], ['acwy', layerStats('acwy')], ['acwz', layerStats('acwz')]]);
  if (!state.selected) { setPairs(els.cellInfo, [['Cell', '-'], ['Index', '-']]); els.recordGrid.innerHTML = ''; return; }
  const cell = state.selected; const idx = cell.row * m.width + cell.col; const rec = recordAt(cell); setPairs(els.cellInfo, [['Cell', `${cell.col}, ${cell.row}`], ['Index', idx], ['Near acwy', nearbyValues(cell, 'acwy')], ['Near acwz', nearbyValues(cell, 'acwz')]]);
  els.recordGrid.innerHTML = ''; m.fields.forEach((name, i) => { const k = document.createElement('span'); k.textContent = name; const v = document.createElement('span'); v.textContent = rec[i]; els.recordGrid.append(k, v); });
  els.brush.value = rec[fieldIndex(els.layer.value)] ?? 0;
}
function hasSelectedLayerPatch() {
  return !!state.selected && state.patches.has(patchKey(state.selected, els.layer.value));
}
function refreshPatches() {
  els.patchCount.value = state.patches.size;
  els.patchList.textContent = [...state.patches.values()].slice(-12).map(p => `${p.x},${p.y} ${p.field}: ${p.before} -> ${p.after}`).join('\n');
  els.status.textContent = state.patches.size ? `Dirty (${state.patches.size})` : 'Ready';
  els.undoEdit.disabled = !state.undoStack.length;
  els.resetCell.disabled = !hasSelectedLayerPatch();
  els.resetAll.disabled = !state.patches.size;
}

function renderResourceList() {
  if (!state.resources) return;
  const layer = els.layer.value;
  const info = state.resources.layers[layer];
  const filter = els.resourceFilter.value.trim();
  const selected = state.selectedResource[layer];
  const entries = info.entries
    .filter(e => !filter || String(e.index).includes(filter))
    .sort((a, b) => els.resourceSort.value === 'used' ? ((b.used || 0) - (a.used || 0) || a.index - b.index) : (a.index - b.index))
    .slice(0, 240);
  els.resourceList.textContent = '';
  let cursor = 0;
  function addChunk() {
    const frag = document.createDocumentFragment();
    const end = Math.min(cursor + 40, entries.length);
    for (; cursor < end; cursor++) {
      const entry = entries[cursor];
      const button = document.createElement('button');
      button.className = 'resource-item' + (selected === entry.index ? ' selected' : '');
      button.title = `${layer} ${entry.index}${entry.used ? `, used ${entry.used}` : ''}`;
      const thumb = document.createElement('div');
      thumb.className = 'resource-thumb';
      thumb.style.width = `${info.tileSize}px`;
      thumb.style.height = `${info.tileSize}px`;
      thumb.style.backgroundImage = `url(${info.image})`;
      thumb.style.backgroundPosition = `-${entry.atlas[0]}px -${entry.atlas[1]}px`;
      const label = document.createElement('div');
      label.className = 'resource-label';
      label.textContent = entry.used ? `${entry.index} x${entry.used}` : entry.index;
      button.append(thumb, label);
      button.addEventListener('click', () => {
        state.selectedResource[layer] = entry.index;
        els.brush.value = entry.index;
        els.tool.value = 'paint';
        renderResourceList();
      });
      frag.append(button);
    }
    els.resourceList.append(frag);
    if (cursor < entries.length) window.setTimeout(addChunk, 0);
  }
  addChunk();
}
function buildResourceIndex() {
  state.resourceByIndex = {};
  for (const layer of state.meta.editableLayers) {
    state.resourceByIndex[layer] = new Map((state.resources.layers[layer]?.entries || []).map(entry => [entry.index, entry]));
  }
}
function drawResource(layer, value, col, row, targetCtx) {
  if (value < 0) return;
  const entry = state.resourceByIndex[layer]?.get(value);
  const atlas = state.drawImages[layer];
  if (!entry || !atlas || !entry.draw) return;
  const [sx, sy, sw, sh] = entry.draw;
  const p = cellToWorld(col, row);
  let dx = p.x;
  let dy = p.y;
  if (layer === 'acwz') {
    dx = p.x + 20 - (entry.xAnchor || 0);
    dy = p.y + 20 - (entry.yAnchor || 0);
  }
  targetCtx.drawImage(atlas, sx, sy, sw, sh, dx, dy, sw, sh);
}
function rebuildEditedImage() {
  if (!state.resources || !state.meta) return;
  const size = canvasSizeForMeta();
  if (!state.renderCanvas || state.renderCanvas.width !== size.width || state.renderCanvas.height !== size.height) {
    state.renderCanvas = document.createElement('canvas');
    state.renderCanvas.width = size.width;
    state.renderCanvas.height = size.height;
    state.renderCtx = state.renderCanvas.getContext('2d');
  }
  const rctx = state.renderCtx;
  rctx.clearRect(0, 0, state.renderCanvas.width, state.renderCanvas.height);
  rctx.imageSmoothingEnabled = false;
  for (let row = 0; row < state.meta.height; row++) {
    for (let col = 0; col < state.meta.width; col++) {
      drawResource('acwx', state.meta.records[row * state.meta.width + col][fieldIndex('acwx')], col, row, rctx);
    }
  }
  for (let row = 0; row < state.meta.height; row++) {
    for (let col = 0; col < state.meta.width; col++) {
      drawResource('acwy', state.meta.records[row * state.meta.width + col][fieldIndex('acwy')], col, row, rctx);
    }
  }
  for (let row = 0; row < state.meta.height; row++) {
    for (let col = 0; col < state.meta.width; col++) {
      drawResource('acwz', state.meta.records[row * state.meta.width + col][fieldIndex('acwz')], col, row, rctx);
    }
  }
}
function syncPatchFor(cell, field) {
  const fi = fieldIndex(field);
  const idx = recordIndex(cell);
  const before = state.originalRecords[idx][fi];
  const after = state.meta.records[idx][fi];
  const key = patchKey(cell, field);
  if (before === after) state.patches.delete(key);
  else state.patches.set(key, { x: cell.col, y: cell.row, field, before, after, minimapDirty: true });
}
function refreshAfterRecordEdit(cell = null) {
  if (cell) state.selected = cell;
  rebuildEditedImage();
  refreshSide();
  refreshPatches();
  draw();
}
function applyChangeSet(changes) {
  const applied = [];
  for (const change of changes) {
    const cell = { col: change.x, row: change.y };
    const fi = fieldIndex(change.field);
    if (fi < 0) continue;
    const rec = recordAt(cell);
    const before = rec[fi];
    const after = change.after;
    if (before === after) continue;
    rec[fi] = after;
    syncPatchFor(cell, change.field);
    applied.push({ x: change.x, y: change.y, field: change.field, before, after });
  }
  if (!applied.length) return false;
  state.undoStack.push(applied);
  const last = applied[applied.length - 1];
  refreshAfterRecordEdit({ col: last.x, row: last.y });
  return true;
}
function undoLastEdit() {
  const changes = state.undoStack.pop();
  if (!changes) return;
  for (const change of [...changes].reverse()) {
    const cell = { col: change.x, row: change.y };
    const fi = fieldIndex(change.field);
    recordAt(cell)[fi] = change.before;
    syncPatchFor(cell, change.field);
  }
  const last = changes[changes.length - 1];
  refreshAfterRecordEdit({ col: last.x, row: last.y });
}
function resetSelectedLayerChange() {
  if (!state.selected) return;
  const field = els.layer.value;
  const fi = fieldIndex(field);
  if (fi < 0) return;
  const original = state.originalRecords[recordIndex(state.selected)][fi];
  applyChangeSet([{ x: state.selected.col, y: state.selected.row, field, after: original }]);
}
function resetAllChanges() {
  const changes = [...state.patches.values()].map(p => ({ x: p.x, y: p.y, field: p.field, after: p.before }));
  applyChangeSet(changes);
}
function applyPaint(cell) {
  const field = els.layer.value; const value = Number.parseInt(els.brush.value, 10); if (!Number.isFinite(value)) return;
  applyChangeSet([{ x: cell.col, y: cell.row, field, after: value }]);
}
function resetEditState(meta) {
  state.meta = meta;
  state.originalRecords = meta.records.map(record => record.slice());
  state.patches.clear();
  state.undoStack = [];
  state.selected = null;
  state.transform = { x: 24, y: 24, scale: 0.8 };
  els.title.textContent = meta.stage;
  for (const layer of meta.editableLayers) { state.selectedResource[layer] = state.resources.layers[layer]?.entries[0]?.index ?? null; }
  rebuildEditedImage();
  refreshSide();
  refreshPatches();
  resizeCanvas();
  renderResourceList();
}
function parseStageM(buffer, name = 'local.m') {
  const view = new DataView(buffer);
  if (buffer.byteLength < 16) throw new Error('file too small for .m header');
  const width = view.getUint32(0, true);
  const height = view.getUint32(4, true);
  const magic = new TextDecoder('ascii').decode(new Uint8Array(buffer, 8, 8));
  if (magic !== 'Hello1.0') throw new Error('not a Hello1.0 .m file');
  const expected = 16 + width * height * 16;
  if (buffer.byteLength < expected) throw new Error(`truncated .m records: expected ${expected} bytes, got ${buffer.byteLength}`);
  const records = [];
  for (let i = 0; i < width * height; i++) {
    const off = 16 + i * 16;
    records.push([
      view.getInt16(off, true), view.getInt16(off + 2, true), view.getInt16(off + 4, true), view.getInt16(off + 6, true),
      view.getUint8(off + 8), view.getUint8(off + 9), view.getUint8(off + 10), view.getUint8(off + 11),
      view.getUint8(off + 12), view.getUint8(off + 13), view.getUint8(off + 14), view.getUint8(off + 15),
    ]);
  }
  return {
    format: 'san-editor-stage-v1', stage: name.replace(/\.m$/i, ''), width, height, layout: 'stagger', origin: [64, 64],
    tile: { width: 40, height: 20, row_step: 10, odd_row_x: 20 },
    fields: state.meta.fields.slice(), editableLayers: state.meta.editableLayers.slice(), palette: state.meta.palette,
    image: null, minimap: { image: null, source: 'local-m-file', sync: 'derived-from-m-records' }, resources: state.meta.resources, records,
    render: { source: 'local-m-file', output_size: [canvasSizeForMeta({ width, height }).width, canvasSizeForMeta({ width, height }).height] },
  };
}
async function loadLocalMFile(file) {
  if (!file) return;
  try {
    const meta = parseStageM(await file.arrayBuffer(), file.name);
    state.minimap = null;
    resetEditState(meta);
    els.stagePicker.value = '';
    els.status.textContent = `Loaded ${file.name}`;
  } catch (err) {
    els.status.textContent = String(err.message || err);
  }
}
async function loadStagePicker() {
  try {
    const index = await fetch('../index.json', { cache: 'no-store' }).then(r => r.ok ? r.json() : null);
    const stages = index?.stages || [];
    if (!stages.length) return;
    els.stagePicker.textContent = '';
    for (const entry of stages) {
      const option = document.createElement('option');
      option.value = entry.stage;
      option.textContent = `${entry.stage} (${entry.width}x${entry.height})`;
      if (entry.stage === state.meta.stage) option.selected = true;

function downloadPatch() { const payload = { format: 'san-editor-patch-v1', stage: state.meta.stage, fields: state.meta.fields, minimap: { dirtyCells: [...state.patches.values()].filter(p => p.minimapDirty).map(p => [p.x, p.y]) }, changes: [...state.patches.values()] }; const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${state.meta.stage}_patch.json`; a.click(); URL.revokeObjectURL(a.href); }
canvas.addEventListener('pointerdown', ev => { canvas.setPointerCapture(ev.pointerId); const world = clientToWorld(ev); const cell = worldToCell(world.x, world.y); const tool = els.tool.value; if (tool === 'pan') { state.dragging = true; state.dragStart = { x: ev.clientX, y: ev.clientY, tx: state.transform.x, ty: state.transform.y }; return; } if (cell) { state.selected = cell; if (tool === 'paint') applyPaint(cell); refreshSide(); draw(); } });
canvas.addEventListener('pointermove', ev => { if (!state.dragging) return; state.transform.x = state.dragStart.tx + ev.clientX - state.dragStart.x; state.transform.y = state.dragStart.ty + ev.clientY - state.dragStart.y; draw(); });
canvas.addEventListener('pointerup', () => { state.dragging = false; });
canvas.addEventListener('wheel', ev => { ev.preventDefault(); const before = clientToWorld(ev); const factor = ev.deltaY < 0 ? 1.12 : 0.89; state.transform.scale = Math.max(0.2, Math.min(5, state.transform.scale * factor)); const rect = canvas.getBoundingClientRect(); state.transform.x = ev.clientX - rect.left - before.x * state.transform.scale; state.transform.y = ev.clientY - rect.top - before.y * state.transform.scale; draw(); }, { passive: false });
mini.addEventListener('pointerdown', ev => { const image = displayImage(); if (!image) return; const source = state.minimap || image; const rect = mini.getBoundingClientRect(); const scale = Math.min(rect.width / source.width, rect.height / source.height); const w = source.width * scale; const h = source.height * scale; const ox = (rect.width - w) / 2; const oy = (rect.height - h) / 2; const x = (ev.clientX - rect.left - ox) / w * image.width; const y = (ev.clientY - rect.top - oy) / h * image.height; const main = canvas.getBoundingClientRect(); state.transform.x = main.width / 2 - x * state.transform.scale; state.transform.y = main.height / 2 - y * state.transform.scale; draw(); });
els.openMFile.addEventListener('click', () => { els.loadMFile.click(); });
els.loadMFile.addEventListener('change', () => { loadLocalMFile(els.loadMFile.files?.[0]); els.loadMFile.value = ''; });
els.stagePicker.addEventListener('change', () => { if (els.stagePicker.value && els.stagePicker.value !== state.meta.stage) location.href = `../${els.stagePicker.value}/editor.html`; });
document.getElementById('resetView').addEventListener('click', () => { state.transform = { x: 24, y: 24, scale: 0.8 }; draw(); });
els.undoEdit.addEventListener('click', undoLastEdit);
els.resetCell.addEventListener('click', resetSelectedLayerChange);
els.resetAll.addEventListener('click', resetAllChanges);
document.getElementById('exportPatch').addEventListener('click', downloadPatch);
document.getElementById('clearFilter').addEventListener('click', () => { els.resourceFilter.value = ''; renderResourceList(); });
els.layer.addEventListener('change', () => { renderResourceList(); refreshSide(); refreshPatches(); });

els.resourceSort.addEventListener('change', renderResourceList);

async function loadImage(src) { const image = new Image(); image.src = src; await image.decode(); return image; }
async function boot() {

  const imagePromise = loadImage(state.meta.image);

  state.image = await imagePromise;
  state.minimap = await minimapPromise;
  state.resources = await resourcePromise;
