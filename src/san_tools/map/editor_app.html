<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>San 地图编辑器</title>
<style>
:root {
  color-scheme: light;
  --bg: #f4f2ec;
  --ink: #202124;
  --muted: #666a70;
  --line: #c9c3b8;
  --panel: #fbfaf7;
  --accent: #0f766e;
  --mark: #f59e0b;
  --soft: #ece7dc;
}
* { box-sizing: border-box; }
body { margin: 0; height: 100vh; overflow: hidden; font-family: "Segoe UI", Arial, sans-serif; color: var(--ink); background: var(--bg); }
#app { display: grid; grid-template-columns: 320px minmax(0, 1fr) 360px; grid-template-rows: 42px minmax(0, 1fr); height: 100vh; }
.toolbar { grid-column: 1 / 4; display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid var(--line); background: var(--panel); }
.toolbar .title { font-weight: 650; margin-right: 10px; white-space: nowrap; }
.toolbar label, .field label { font-size: 12px; color: var(--muted); }
select, input, button { height: 28px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); font: inherit; }
select, input { padding: 0 8px; }
button { padding: 0 10px; cursor: pointer; }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
button.secondary { background: #fff; color: var(--accent); border-color: var(--accent); }
button:disabled { cursor: not-allowed; opacity: 0.55; }
.status { margin-left: auto; color: var(--muted); font-size: 12px; }
#viewport { position: relative; min-width: 0; min-height: 0; background: #1d1b18; }
canvas { width: 100%; height: 100%; display: block; }
.side { min-height: 0; overflow: auto; background: var(--panel); padding: 12px; }
.side-left { border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
.side-left .section { flex: 0 0 auto; }
.side-right { border-left: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
.side-right .section { flex: 0 0 auto; }
.side-right .resource-section { flex: 1 1 auto; min-height: 0; overflow: hidden; }
.section { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }
.section:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
.section-title { font-size: 12px; font-weight: 650; color: var(--muted); text-transform: uppercase; letter-spacing: 0; margin-bottom: 8px; }
.kv { display: grid; grid-template-columns: 100px 1fr; gap: 6px 10px; font-size: 13px; }
.kv .k { color: var(--muted); }
.field { display: grid; grid-template-columns: 90px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
.field:last-child { margin-bottom: 0; }
.patch-section { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.patch-list { font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; color: #343434; min-height: 32px; flex: 1 1 auto; overflow: auto; }
.resource-section { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
.resource-controls { display: grid; grid-template-columns: minmax(0, 1fr) 92px 56px; gap: 6px; margin-bottom: 8px; }
.resource-controls > * { min-width: 0; width: 100%; }
.resource-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.resource-list { position: relative; flex: 1 1 auto; min-height: 0; overflow: auto; padding-right: 2px; }
.resource-spacer { position: relative; min-height: 100%; }
.resource-item { position: absolute; border: 1px solid var(--line); border-radius: 6px; background: #fff; padding: 3px; display: grid; grid-template-rows: minmax(0, 1fr) 16px; align-items: center; justify-items: center; overflow: hidden; }
.resource-item.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(15,118,110,.18); }
.resource-thumb { background-color: #111; background-repeat: no-repeat; image-rendering: pixelated; align-self: start; }
.resource-thumb.point-swatch { align-self: center; border-radius: 999px; background-image: none; background-color: transparent; border: 1px solid rgba(17, 24, 39, 0.16); }
.resource-thumb.point-swatch.zero { border-radius: 6px; background: repeating-linear-gradient(135deg, #ffffff 0 5px, #e5e7eb 5px 10px); }
.resource-label { width: 100%; font-size: 11px; color: var(--muted); line-height: 14px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.minimap-wrap { position: relative; border: 1px solid var(--line); background: #111; }
#minimap { height: 150px; }
.record-list { display: grid; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
.record-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 6px 10px; align-items: center; padding: 6px 8px; border-top: 1px solid var(--soft); background: #fff; }
.record-row:first-child { border-top: 0; }
.record-row.dirty { background: #f3fbf9; box-shadow: inset 3px 0 0 rgba(15,118,110,.7); }
.record-copy { min-width: 0; }
.record-name { font-size: 13px; font-weight: 600; }
.record-name span { color: var(--muted); font-weight: 400; }
.record-note { font-size: 12px; color: var(--muted); margin-top: 1px; }
.record-actions { display: flex; align-items: center; gap: 6px; }
.record-actions input { width: 104px; }
.record-readonly { min-width: 104px; text-align: right; font-family: Consolas, monospace; color: var(--muted); }
.placeholder { color: var(--muted); font-size: 13px; padding: 8px 2px; }
@media (max-width: 980px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto 320px minmax(0, 1fr) 360px; }
  .toolbar { grid-column: 1; flex-wrap: wrap; height: auto; }
  .side { border: 0; border-top: 1px solid var(--line); }
  .side-left { grid-row: 2; }
  #viewport { grid-row: 3; }
  .side-right { grid-row: 4; }
  .resource-controls { grid-template-columns: minmax(0, 1fr) 88px 56px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <div class="title" id="stageTitle">关卡</div>
    <label>关卡</label>
    <select id="stagePicker"><option value="">当前</option></select>
    <label>工具</label>
    <select id="tool" title="查看用于选中格子，绘制会写入当前资源。右键拖动平移地图。"><option value="inspect">查看</option><option value="paint">绘制</option></select>
    <input id="loadMFile" type="file" accept=".m" hidden>
    <button id="openMFile">打开 .m</button>
    <button id="resetView">重置视图</button>
    <button id="undoEdit">撤销</button>
    <button id="resetCell">重置当前图层</button>
    <button id="resetAll">重置全部</button>
    <button id="exportFiles" class="primary">导出 .m/.s/.x</button>
    <button id="exportPatch" class="secondary">导出 patch</button>
    <span class="status" id="status">正在加载</span>
  </div>
  <aside class="side side-left">
    <div class="section">
      <div class="section-title">Cell</div>
      <div class="kv" id="cellInfo"></div>
    </div>
    <div class="section">
      <div class="section-title">Record</div>
      <div class="record-list" id="recordList"></div>
    </div>
    <div class="section patch-section">
      <div class="section-title">修改</div>
      <div class="field"><label>修改数量</label><input id="patchCount" value="0" readonly></div>
      <div class="patch-list" id="patchList"></div>
    </div>
  </aside>
  <div id="viewport"><canvas id="canvas"></canvas></div>
  <aside class="side side-right">
    <div class="section">
      <div class="section-title">Minimap</div>
      <div class="minimap-wrap"><canvas id="minimap"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title">Stage</div>
      <div class="kv" id="stageInfo"></div>
    </div>
    <div class="section resource-section">
      <div class="section-title">Resources</div>
      <div class="field"><label>图层</label><select id="layer"></select></div>
      <div class="resource-controls">
        <input id="resourceFilter" placeholder="按编号过滤">
        <select id="resourceSort"><option value="index">按编号</option><option value="used">按使用数</option></select>
        <button id="clearFilter">清除</button>
      </div>
      <div class="resource-meta" id="resourceMeta"></div>
      <div class="resource-list" id="resourceList"><div class="resource-spacer" id="resourceSpacer"></div></div>
    </div>
  </aside>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const miniCtx = mini.getContext('2d');
const LEGACY_FIELD_ALIASES = { flags: 'word06', final_palette: 'byte13' };
const DEFAULT_FIELD_META = [
  { name: 'acwx', alias: 'terrain_base', label: '底层地表', editable: true, reserved: false },
  { name: 'acwy', alias: 'terrain_overlay', label: '叠加地表', editable: true, reserved: false },
  { name: 'acwz', alias: 'object_overlay', label: '物件层', editable: true, reserved: false },
  { name: 'word06', alias: '', label: '保留字段', editable: false, reserved: true },
  { name: 'byte08', alias: 'land_water_hint', label: '水陆切换提示', editable: true, reserved: false },
  { name: 'byte09', alias: 'blocked', label: '阻挡标记', editable: true, reserved: false },
  { name: 'byte10', alias: 'site_trigger', label: '据点触发', editable: true, reserved: false },
  { name: 'byte11', alias: 'site_area', label: '据点区域', editable: true, reserved: false },
  { name: 'byte12', alias: 'reserved1', label: '保留字段 1', editable: false, reserved: true },
  { name: 'byte13', alias: 'minimap_color', label: '小地图颜色', editable: true, reserved: false, sidecarSource: true },
  { name: 'byte14', alias: 'reserved2', label: '保留字段 2', editable: false, reserved: true },
  { name: 'byte15', alias: 'reserved3', label: '保留字段 3', editable: false, reserved: true },

const EXPORT_FIELD_ORDER = DEFAULT_FIELD_META.map(entry => entry.name);
const RESOURCE_LAYER_OPTIONS = ['acwx', 'acwy', 'acwz'];
const POINT_LAYER_OPTIONS = ['byte08', 'byte09', 'byte10', 'byte11'];
const PAINT_LAYER_OPTIONS = [...RESOURCE_LAYER_OPTIONS, ...POINT_LAYER_OPTIONS];

const RESOURCE_ITEM_HEIGHT = 76;

const RESOURCE_ITEM_PADDING = 6;
const RESOURCE_LABEL_HEIGHT = 16;
const RESOURCE_OVERSCAN_ROWS = 3;
const state = {
  meta: null,
  resources: null,
  resourceByIndex: {},
  drawImages: {},
  layerStats: {},
  image: null,
  renderCanvas: null,
  renderCtx: null,
  minimap: null,
  selected: null,
  selectedResource: Object.fromEntries(PAINT_LAYER_OPTIONS.map(layer => [layer, null])),
  transform: { x: 24, y: 24, scale: 0.8 },
  dragging: false,
  dragStart: null,
  drawQueued: false,
  redrawConfig: { maxLeft: 20, maxRight: 40, maxUp: 20, maxDown: 20, colRadius: 2, rowRadius: 2 },
  patches: new Map(),
  originalRecords: null,
  undoStack: [],

const els = {
  status: document.getElementById('status'), title: document.getElementById('stageTitle'), stageInfo: document.getElementById('stageInfo'),
  cellInfo: document.getElementById('cellInfo'), recordList: document.getElementById('recordList'), tool: document.getElementById('tool'),
  layer: document.getElementById('layer'), patchCount: document.getElementById('patchCount'),
  patchList: document.getElementById('patchList'), resourceList: document.getElementById('resourceList'), resourceSpacer: document.getElementById('resourceSpacer'), resourceMeta: document.getElementById('resourceMeta'), resourceFilter: document.getElementById('resourceFilter'),
  resourceSort: document.getElementById('resourceSort'), undoEdit: document.getElementById('undoEdit'), resetCell: document.getElementById('resetCell'), resetAll: document.getElementById('resetAll'),
  openMFile: document.getElementById('openMFile'), loadMFile: document.getElementById('loadMFile'), stagePicker: document.getElementById('stagePicker'),
  exportFiles: document.getElementById('exportFiles'),
};
function canonicalFieldName(name) { return LEGACY_FIELD_ALIASES[name] || name; }
function fieldIndex(name) { return state.meta.fields.indexOf(canonicalFieldName(name)); }
function recordIndex(cell) { return cell.row * state.meta.width + cell.col; }
function recordAt(cell) { return state.meta.records[recordIndex(cell)]; }
function cellKey(cell) { return `${cell.col},${cell.row}`; }

function cellToWorld(col, row) { const [ox, oy] = state.meta.origin; return { x: ox + col * 40 + (row & 1 ? 20 : 0), y: oy + row * 10 }; }
function displayImage() { return state.renderCanvas || state.image; }
function canvasSizeForMeta(meta = state.meta) { return { width: meta.width * 40 + 20 + 128, height: meta.height * 10 + 20 + 128 }; }
function worldToCell(x, y) {
  const [ox, oy] = state.meta.origin;
  const row = Math.floor((y - oy) / 10);
  const col = Math.floor((x - ox - (row & 1 ? 20 : 0)) / 40);

function clientToWorld(ev) { const rect = canvas.getBoundingClientRect(); return { x: (ev.clientX - rect.left - state.transform.x) / state.transform.scale, y: (ev.clientY - rect.top - state.transform.y) / state.transform.scale }; }
function isEditableTarget(target) { return target instanceof HTMLElement && (target.tagName === 'INPUT' || target.tagName === 'SELECT' || target.tagName === 'TEXTAREA' || target.isContentEditable); }
function defaultFieldMetaByName() { return new Map(DEFAULT_FIELD_META.map(entry => [entry.name, entry])); }
function normalizeSidecars(sidecars) {

    if (entry && typeof entry.tailBase64 === 'string' && entry.tailBase64) tails[suffix] = { ...entry };

    available: sidecars?.available === true && Object.keys(tails).length === 2,
    gridSize,
    activeRows,
    tailRows: Number.isInteger(sidecars?.tailRows) ? sidecars.tailRows : Math.max(0, gridSize - activeRows),

}
function sourceOutputSize(meta = state.meta) {

  if (!Array.isArray(size) || size.length !== 2) return null;
  const width = Number(size[0]);
  const height = Number(size[1]);

}
function shouldLoadBaseImage(meta = state.meta) {
  const size = sourceOutputSize(meta);

}
function normalizeMeta(meta) {

  const rawFieldMeta = Array.isArray(meta.fieldMeta) ? meta.fieldMeta : [];

  const fieldMeta = fields.map(name => {
    const base = defaultMeta.get(name) || { name, alias: name, label: name, editable: true, reserved: false };
    const raw = rawMetaByName.get(name) || {};
    return {
      name,
      alias: typeof raw.alias === 'string' ? raw.alias : base.alias,
      label: typeof raw.label === 'string' ? raw.label : base.label,
      editable: raw.editable ?? base.editable,
      reserved: raw.reserved ?? base.reserved,
      sidecarSource: raw.sidecarSource ?? !!base.sidecarSource,

  const resourceLayers = (Array.isArray(meta.resourceLayers) && meta.resourceLayers.length ? meta.resourceLayers : editableLayers).map(canonicalFieldName);
  const pointLayers = (Array.isArray(meta.pointLayers) && meta.pointLayers.length ? meta.pointLayers : POINT_LAYER_OPTIONS).map(canonicalFieldName);
  const editableRecordFields = (Array.isArray(meta.editableRecordFields) && meta.editableRecordFields.length ? meta.editableRecordFields : fieldMeta.filter(entry => entry.editable && !entry.reserved).map(entry => entry.name)).map(canonicalFieldName);

}
function getFieldMeta(name) {
  return state.fieldMetaByName.get(canonicalFieldName(name)) || DEFAULT_FIELD_META.find(entry => entry.name === canonicalFieldName(name)) || { name, alias: name, label: name, editable: true, reserved: false };
}
function isResourceLayer(name) {
  const field = canonicalFieldName(name);
  return state.meta?.resourceLayers?.includes(field) || RESOURCE_LAYER_OPTIONS.includes(field);
}
function isPointLayer(name) {
  const field = canonicalFieldName(name);
  return state.meta?.pointLayers?.includes(field) || POINT_LAYER_OPTIONS.includes(field);
}
function currentLayerName() { return canonicalFieldName(els.layer.value); }
function visiblePointLayer() {
  const layer = currentLayerName();
  return isPointLayer(layer) ? layer : null;
}
function pointPaletteColor(value) {
  return state.meta?.pointPalette?.[value] || '#0f766e';
}
function ensureSelectedResource(layer) {
  const field = canonicalFieldName(layer);
  if (Number.isFinite(state.selectedResource[field])) return;
  if (isPointLayer(field)) {
    if (state.selected) {
      const fi = fieldIndex(field);
      if (fi >= 0) state.selectedResource[field] = recordAt(state.selected)[fi];
    }
    if (!Number.isFinite(state.selectedResource[field])) state.selectedResource[field] = 0;
    return;

function recordFieldBounds(name) {

}
function formatFieldName(meta) { return meta.alias ? `${meta.name} · ${meta.alias}` : meta.name; }
function layerOptionLabel(name) {
  const meta = getFieldMeta(name);
  return `${meta.label}(${canonicalFieldName(name)})`;
}
function renderLayerOptions() {
  const options = [...(state.meta?.resourceLayers || RESOURCE_LAYER_OPTIONS), ...(state.meta?.pointLayers || POINT_LAYER_OPTIONS)];

    const option = document.createElement('option');
    option.value = name;
    option.textContent = layerOptionLabel(name);

function moveSelected(dx, dy) {

  next.row = Math.max(0, Math.min(state.meta.height - 1, next.row));

  refreshPatches();

function startDrag(ev) {
  canvas.setPointerCapture(ev.pointerId);

function stopDrag(ev = null) {

function resizeCanvas() {

function diamondPath(col, row) { const p = cellToWorld(col, row); ctx.beginPath(); ctx.moveTo(p.x + 20, p.y); ctx.lineTo(p.x + 40, p.y + 10); ctx.lineTo(p.x + 20, p.y + 20); ctx.lineTo(p.x, p.y + 10); ctx.closePath(); }

function draw() {

  if (!image) return;

  for (let i = 0; i < width * height; i++) {
    const off = 16 + i * 16;
    records.push([
      view.getInt16(off, true), view.getInt16(off + 2, true), view.getInt16(off + 4, true), view.getInt16(off + 6, true),
      view.getUint8(off + 8), view.getUint8(off + 9), view.getUint8(off + 10), view.getUint8(off + 11),
      view.getUint8(off + 12), view.getUint8(off + 13), view.getUint8(off + 14), view.getUint8(off + 15),

  }

    tile: { width: 40, height: 20, row_step: 10, odd_row_x: 20 },
    fields: state.meta.fields.slice(), fieldMeta: state.meta.fieldMeta.map(entry => ({ ...entry })), editableLayers: state.meta.editableLayers.slice(), editableRecordFields: state.meta.editableRecordFields.slice(), palette: state.meta.palette,

}
async function loadLocalMFile(file) {

    const meta = parseStageM(await file.arrayBuffer(), file.name);

    state.minimap = null;
    state.baseImageMode = 'rebuild';
    state.baseImageNote = '已加载本地 .m，当前视图改用资源重建';
    resetEditState(meta);
    els.stagePicker.value = '';
    els.status.textContent = `已加载 ${file.name}`;

    els.status.textContent = String(err.message || err);

async function loadStagePicker() {

    const index = await fetch('../index.json', { cache: 'no-store' }).then(resp => resp.ok ? resp.json() : null);
    const stages = index?.stages || [];
    if (!stages.length) return;
    els.stagePicker.textContent = '';
    for (const entry of stages) {
      const option = document.createElement('option');
      option.value = entry.stage;
      option.textContent = `${entry.stage} (${entry.width}x${entry.height})`;

function downloadPatch() {

    format: 'san-editor-patch-v1',
    stage: state.meta.stage,
    fields: state.meta.fields,
    minimap: { dirtyCells: [...state.patches.values()].filter(patch => patch.minimapDirty).map(patch => [patch.x, patch.y]) },
    changes: [...state.patches.values()],

  a.href = URL.createObjectURL(blob);

function recordValue(record, field) {

  if (fi < 0) throw new Error(`缺少字段 ${field}`);
  return record[fi];

function buildStageBytes() {

    const record = state.meta.records[index];
    const off = 16 + index * 16;
    view.setInt16(off, recordValue(record, 'acwx'), true);
    view.setInt16(off + 2, recordValue(record, 'acwy'), true);
    view.setInt16(off + 4, recordValue(record, 'acwz'), true);
    view.setInt16(off + 6, recordValue(record, 'word06'), true);
    view.setUint8(off + 8, recordValue(record, 'byte08'));
    view.setUint8(off + 9, recordValue(record, 'byte09'));
    view.setUint8(off + 10, recordValue(record, 'byte10'));
    view.setUint8(off + 11, recordValue(record, 'byte11'));
    view.setUint8(off + 12, recordValue(record, 'byte12'));
    view.setUint8(off + 13, recordValue(record, 'byte13'));
    view.setUint8(off + 14, recordValue(record, 'byte14'));
    view.setUint8(off + 15, recordValue(record, 'byte15'));

function nearestSampleIndex(sourceSize, targetIndex, targetSize) {
  return Math.max(0, Math.min(sourceSize - 1, Math.floor((targetIndex + 0.5) * sourceSize / targetSize)));
}
function buildActiveSidecarBytes() {
  const gridSize = state.meta.sidecars.gridSize || 160;
  const activeRows = state.meta.sidecars.activeRows || 128;
  const fi = fieldIndex('byte13');
  if (fi < 0) throw new Error('当前关卡缺少 byte13/minimap_color 字段。');
  const output = new Uint8Array(gridSize * activeRows);
  for (let targetRow = 0; targetRow < activeRows; targetRow++) {
    const sourceRow = nearestSampleIndex(state.meta.height, targetRow, activeRows);
    for (let targetCol = 0; targetCol < gridSize; targetCol++) {
      const sourceCol = nearestSampleIndex(state.meta.width, targetCol, gridSize);
      output[targetRow * gridSize + targetCol] = state.meta.records[sourceRow * state.meta.width + sourceCol][fi] & 0xFF;

function base64ToBytes(text) {
  const raw = window.atob(text);

  for (let index = 0; index < raw.length; index++) bytes[index] = raw.charCodeAt(index);

}
function buildSidecarBytes(suffix) {

function buildExportArtifacts() {

    const built = buildSidecarBytes(suffix);
    files.push({ name: `${stageName}.${suffix}`, bytes: built.bytes });
    sidecarFlags.push(built.usedFallbackTail);

async function writeFilesToDirectory(dirHandle, files) {
  for (const file of files) {
    const handle = await dirHandle.getFileHandle(file.name, { create: true });
    const writer = await handle.createWritable();
    await writer.write(file.bytes);
    await writer.close();
  }
}
function triggerDownload(name, bytes) {
  const blob = new Blob([bytes], { type: 'application/octet-stream' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = name;
  link.click();
  window.setTimeout(() => URL.revokeObjectURL(link.href), 1000);
}
async function exportEditedArtifacts() {
  try {
    const artifacts = buildExportArtifacts();
    if (typeof window.showDirectoryPicker === 'function') {
      try {
        const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        await writeFilesToDirectory(dirHandle, artifacts.files);
        els.status.textContent = artifacts.usedFallbackTail ? '已导出 .m/.s/.x，缺失 sidecar 尾区时已用 0 填充。' : '已导出 .m/.s/.x';
        return;

        if (err?.name === 'AbortError') {
          els.status.textContent = '已取消导出';
          return;

    for (const [index, file] of artifacts.files.entries()) {
      window.setTimeout(() => triggerDownload(file.name, file.bytes), index * 180);

    els.status.textContent = artifacts.usedFallbackTail ? '已开始下载 .m/.s/.x，缺失 sidecar 尾区时已用 0 填充。' : '已开始下载 .m/.s/.x';

    els.status.textContent = String(err.message || err);
  }
}
canvas.addEventListener('contextmenu', ev => { ev.preventDefault(); });
canvas.addEventListener('pointerdown', ev => {

    startDrag(ev);
    return;
  }
  if (ev.button !== 0) return;
  const world = clientToWorld(ev);
  const cell = worldToCell(world.x, world.y);
  if (!cell) return;
  state.selected = cell;
  if (els.tool.value === 'paint') {
    applyPaint(cell);
    return;
  }

  scheduleDraw();
});
canvas.addEventListener('pointermove', ev => {
  if (!state.dragging || !state.dragStart || ev.pointerId !== state.dragStart.pointerId) return;
  state.transform.x = state.dragStart.tx + ev.clientX - state.dragStart.x;
  state.transform.y = state.dragStart.ty + ev.clientY - state.dragStart.y;

});
canvas.addEventListener('pointerup', ev => { stopDrag(ev); });
canvas.addEventListener('pointercancel', ev => { stopDrag(ev); });
canvas.addEventListener('lostpointercapture', ev => { stopDrag(ev); });

els.openMFile.addEventListener('click', () => { els.loadMFile.click(); });
els.loadMFile.addEventListener('change', () => { loadLocalMFile(els.loadMFile.files?.[0]); els.loadMFile.value = ''; });
els.stagePicker.addEventListener('change', () => { if (els.stagePicker.value && els.stagePicker.value !== state.meta.stage) location.href = `../${els.stagePicker.value}/editor.html`; });
document.getElementById('resetView').addEventListener('click', () => { state.transform = { x: 24, y: 24, scale: 0.8 }; scheduleDraw(); });
els.undoEdit.addEventListener('click', undoLastEdit);
els.resetCell.addEventListener('click', resetSelectedLayerChange);
els.resetAll.addEventListener('click', resetAllChanges);
document.getElementById('exportPatch').addEventListener('click', downloadPatch);
els.exportFiles.addEventListener('click', () => { exportEditedArtifacts(); });
document.getElementById('clearFilter').addEventListener('click', () => { els.resourceFilter.value = ''; renderResourceList(); });
els.layer.addEventListener('change', () => { ensureSelectedResource(currentLayerName()); renderResourceList(); refreshSide(); refreshPatches(); scheduleDraw(); });
els.resourceFilter.addEventListener('input', () => { renderResourceList(); });

els.resourceList.addEventListener('scroll', scheduleResourceListRender);
els.resourceList.addEventListener('click', ev => {
  const button = ev.target.closest('.resource-item');
  if (!button) return;
  const layer = state.resourceListModel?.layer || els.layer.value;

window.addEventListener('keydown', ev => {
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'z' && !ev.shiftKey) {
    ev.preventDefault();
    undoLastEdit();
    return;
  }
  if (isEditableTarget(ev.target)) return;
  if (ev.altKey || ev.ctrlKey || ev.metaKey || ev.shiftKey) return;

  if (ev.key === 'ArrowRight') { ev.preventDefault(); moveSelected(1, 0); return; }

window.addEventListener('resize', () => { resizeCanvas(); scheduleResourceListRender(); });
async function loadImage(src) { const image = new Image(); image.src = src; await image.decode(); return image; }

    const size = sourceOutputSize(meta);

async function boot() {
