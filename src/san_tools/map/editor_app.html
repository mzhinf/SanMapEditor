<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>San 地图编辑器</title>
<style>
:root {
  color-scheme: light;
  --bg: #ece8df;
  --panel: #fbfaf7;
  --panel-2: #f5f1e8;
  --ink: #202124;
  --muted: #687079;
  --line: #c9c3b8;
  --soft: #e6dfd3;
  --accent: #0f766e;
  --accent-weak: #d9f1ed;
  --mark: #b7791f;
  --danger: #b91c1c;
  --canvas: #1d1b18;
}
* { box-sizing: border-box; }
body { margin: 0; height: 100vh; overflow: hidden; font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", "Segoe UI", Arial, sans-serif; color: var(--ink); background: var(--bg); }
button, select, input { height: 28px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); font: inherit; }
button { display: inline-flex; align-items: center; justify-content: center; gap: 4px; padding: 0 10px; cursor: pointer; white-space: nowrap; }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.secondary { border-color: var(--accent); color: var(--accent); }
button.ghost { background: transparent; }
button:disabled { cursor: not-allowed; opacity: 0.5; }
select, input { min-width: 0; padding: 0 8px; }
canvas { display: block; width: 100%; height: 100%; }
#app { height: 100vh; display: grid; grid-template-columns: 316px minmax(0, 1fr) 380px; grid-template-rows: 48px minmax(0, 1fr) 138px; grid-template-areas: "top top top" "left canvas right" "bottom bottom bottom"; }
.topbar { grid-area: top; position: relative; display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--line); background: var(--panel); }
.title { font-weight: 700; min-width: 130px; }
.app-identity { display: grid; gap: 1px; flex: 0 0 auto; }
.build-meta { color: var(--muted); font-size: 10px; white-space: nowrap; }
.toolbar-group { display: flex; align-items: center; gap: 6px; min-width: 0; }
.coord-input { width: 58px; }
.toolbar-group label { font-size: 12px; color: var(--muted); }
.status { flex: 1 1 0; min-width: 0; max-width: 620px; margin-left: auto; color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status.error { position: fixed; z-index: 20; top: 56px; right: 12px; width: min(620px, calc(100vw - 24px)); max-width: none; max-height: 160px; margin: 0; padding: 10px 12px; overflow: auto; border: 1px solid var(--danger); border-radius: 6px; background: #fff; color: var(--danger); box-shadow: 0 8px 24px rgba(32, 33, 36, .18); cursor: pointer; text-overflow: clip; white-space: pre-wrap; overflow-wrap: anywhere; }
.resource-panel, .inspector-panel, .bottom-dock { min-width: 0; min-height: 0; background: var(--panel); }
.resource-panel { grid-area: left; border-right: 1px solid var(--line); display: grid; grid-template-rows: auto minmax(0, 1fr) auto; gap: 12px; padding: 12px; overflow: hidden; }
.canvas-zone { grid-area: canvas; position: relative; min-width: 0; min-height: 0; background: var(--canvas); overflow: hidden; }
.inspector-panel { grid-area: right; border-left: 1px solid var(--line); display: grid; grid-template-rows: auto minmax(0, 1fr); overflow: hidden; }
.bottom-dock { grid-area: bottom; border-top: 1px solid var(--line); display: grid; grid-template-columns: 320px minmax(0, 1fr) 360px; gap: 12px; padding: 10px 12px; overflow: hidden; }
.section { min-width: 0; }
.section + .section { border-top: 1px solid var(--soft); padding-top: 12px; }
.section-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0; }
.panel-collapse { width: 24px; min-width: 24px; height: 24px; padding: 0; font-size: 16px; line-height: 1; }
.collapsible-section.collapsed .collapsible-body { display: none; }
.collapsible-section.collapsed .section-title { margin-bottom: 0; }
.layer-list { display: grid; gap: 6px; }
.layer-row { display: grid; grid-template-columns: auto minmax(0, 1fr); align-items: center; gap: 8px; padding: 6px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
.layer-row.active { border-color: var(--accent); background: #ecfeff; }
.layer-row button { text-align: left; }
.overlay-list { display: grid; gap: 6px; }
.overlay-toggle { display: grid; grid-template-columns: 18px 18px minmax(0, 1fr); align-items: center; gap: 8px; padding: 6px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 12px; }
.overlay-toggle input { width: 16px; min-width: 16px; height: 16px; padding: 0; }
.overlay-swatch { width: 16px; height: 16px; border: 1px solid rgba(17,24,39,.22); border-radius: 4px; }
.field { display: grid; grid-template-columns: 86px minmax(0, 1fr); gap: 8px; align-items: center; margin-bottom: 8px; }
.field label { color: var(--muted); font-size: 12px; }
.resource-section { min-height: 0; display: grid; grid-template-rows: auto auto minmax(0, 1fr); }
.resource-controls { display: grid; grid-template-columns: minmax(0, 1fr) 92px 56px; gap: 6px; margin-bottom: 8px; }
.resource-meta, .hint, .site-note { color: var(--muted); font-size: 12px; line-height: 1.55; }
.resource-list { position: relative; min-height: 0; overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.resource-spacer { position: relative; min-height: 100%; }
.resource-item { position: absolute; display: grid; grid-template-rows: minmax(0, 1fr) 16px; align-items: center; justify-items: center; overflow: hidden; border: 1px solid var(--line); border-radius: 6px; background: #fff; padding: 3px; }
.resource-item.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(15, 118, 110, .18); }
.resource-thumb { align-self: start; background-color: #111; background-repeat: no-repeat; image-rendering: pixelated; }
.resource-thumb.point-swatch { align-self: center; border: 1px solid rgba(17, 24, 39, .16); border-radius: 999px; background-image: none; }
.resource-thumb.point-swatch.zero { border-radius: 6px; background: repeating-linear-gradient(135deg, #fff 0 5px, #e5e7eb 5px 10px); }
.resource-label { width: 100%; overflow: hidden; color: var(--muted); font-size: 11px; line-height: 14px; text-align: center; text-overflow: ellipsis; white-space: nowrap; }
.composite-actions, .selection-actions, .site-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.composite-list { display: grid; gap: 6px; max-height: 112px; overflow: auto; margin-top: 8px; }
.composite-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 6px; padding: 6px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 12px; }
.canvas-hud { position: absolute; z-index: 2; left: 12px; top: 12px; display: flex; flex-wrap: wrap; gap: 8px; max-width: calc(100% - 248px); pointer-events: none; }
.hud-pill { padding: 5px 8px; border: 1px solid rgba(255,255,255,.28); border-radius: 999px; color: #fff; background: rgba(20, 20, 18, .72); font-size: 12px; }
.minimap-float { position: absolute; z-index: 3; top: 12px; right: 12px; width: 210px; border: 1px solid rgba(255,255,255,.28); border-radius: 8px; background: rgba(20,20,18,.78); padding: 8px; }
.minimap-title { margin-bottom: 6px; color: #fff; font-size: 12px; font-weight: 700; }
#minimap { height: 128px; background: #111; }
.inspector-tabs { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 4px; padding: 8px; border-bottom: 1px solid var(--line); background: var(--panel-2); }
.inspector-tab { height: 30px; padding: 0 6px; font-size: 12px; }
.inspector-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.inspector-body { min-height: 0; overflow: auto; padding: 12px; }
.inspector-page { display: none; }
.inspector-page.active { display: grid; gap: 12px; }
.inspector-page[data-page="sites"], .inspector-page[data-page="entities"] { min-height: 0; height: 100%; }
.inspector-page[data-page="sites"] > .section, .inspector-page[data-page="entities"] > .section { min-height: 0; display: grid; }
.inspector-page[data-page="sites"] > .section { grid-template-rows: auto auto auto minmax(0, 1fr); }
.inspector-page[data-page="entities"] > .section { grid-template-rows: auto minmax(0, 1fr); }
.kv { display: grid; grid-template-columns: 104px minmax(0, 1fr); gap: 6px 10px; font-size: 13px; }
.kv .k { color: var(--muted); }
.manager-list { display: grid; gap: 8px; }
.manager-toolbar { display: flex; gap: 6px; align-items: center; }
.manager-split { display: grid; grid-template-rows: minmax(96px, auto) auto; gap: 8px; }
.manager-items { display: grid; gap: 6px; max-height: 220px; overflow: auto; }
.manager-row { display: grid; grid-template-columns: minmax(0, 1fr) repeat(2, auto); gap: 8px; align-items: center; padding: 7px 8px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 12px; }
.manager-row.active { border-color: var(--accent); background: var(--accent-weak); }
.manager-detail { display: grid; gap: 8px; padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.site-note, #entityList { min-height: 0; }
.site-note > .manager-detail { min-height: 0; height: 100%; grid-template-rows: minmax(0, 1fr) auto; overflow: hidden; }
.site-note .source-pages, .site-note .source-page { height: 100%; }
.site-note .source-page > div { min-height: 0; height: 100%; }
.site-note .source-page > div:not(.source-tab-panel) { overflow: auto; }
.site-note .manager-sublist { max-height: none; }
#entityList { display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; }
#entityList > .manager-split { min-height: 0; grid-template-rows: minmax(96px, 140px) minmax(0, 1fr); }
#entityList .manager-detail { min-height: 0; overflow: hidden; }
#entityList .entity-detail { grid-template-rows: auto minmax(0, 1fr) auto; }
#entityList .source-pages, #entityList .source-page { height: 100%; }
.source-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.source-tab { height: 28px; padding: 0 8px; font-size: 12px; }
.source-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.source-tab-panel { min-height: 0; overflow: hidden; grid-template-rows: auto minmax(0, 1fr); }
.source-pages { min-height: 0; overflow: hidden; }
.source-page { display: none; gap: 8px; }
.source-page.active { display: grid; min-height: 0; overflow: auto; align-content: start; }
.manager-sublist { display: grid; gap: 4px; max-height: 160px; overflow: auto; }
.manager-chip { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 6px; align-items: center; padding: 5px 6px; border: 1px solid var(--soft); border-radius: 6px; background: #fbfaf7; font-size: 12px; }
.entity-card { display: grid; grid-template-columns: 112px minmax(0, 1fr); gap: 8px; align-items: start; }
.portrait { width: 105px; height: 116px; border: 1px solid var(--line); border-radius: 6px; background-color: #111; background-repeat: no-repeat; image-rendering: pixelated; }
.field-row { display: grid; grid-template-columns: 104px minmax(0, 1fr); gap: 8px; align-items: center; margin: 0; color: var(--muted); font-size: 12px; }
.field-row .field-key { overflow-wrap: anywhere; }
.field-row input, .field-row select { width: 100%; min-width: 0; }
.manager-row { display: grid; grid-template-columns: minmax(0, 1fr) repeat(2, auto); gap: 8px; align-items: center; padding: 7px 8px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 12px; }
.record-list { display: grid; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
.record-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 6px 10px; align-items: center; padding: 6px 8px; border-top: 1px solid var(--soft); background: #fff; }
.record-row:first-child { border-top: 0; }
.record-row.dirty { background: #f3fbf9; box-shadow: inset 3px 0 0 rgba(15,118,110,.7); }
.record-copy { min-width: 0; }
.record-name { font-size: 13px; font-weight: 600; }
.record-note { margin-top: 1px; color: var(--muted); font-size: 12px; }
.record-actions { display: flex; align-items: center; gap: 6px; }
.record-actions input { width: 104px; }
.validation-list { display: grid; gap: 6px; }
.validation-item { padding: 7px 8px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 12px; }
.validation-item.error { border-color: #ef9a9a; background: #fff5f5; color: var(--danger); }
.validation-item.warn { border-color: #f2c46d; background: #fff9ea; color: #7c4a03; }
.patch-section, .history-section { min-height: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); }
.patch-list { min-height: 0; overflow: auto; color: #343434; font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; }
.placeholder { padding: 8px 2px; color: var(--muted); font-size: 13px; }
@media (max-width: 1100px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto 240px minmax(0, 1fr) 360px 150px; grid-template-areas: "top" "left" "canvas" "right" "bottom"; }
  .topbar { flex-wrap: wrap; height: auto; }
  .bottom-dock { grid-template-columns: 1fr; overflow: auto; }
  .minimap-float { width: 176px; }
}
</style>
</head>
<body>
<div id="app" class="editor-v2">
  <header class="topbar">
    <div class="app-identity">
      <div class="title" id="stageTitle">地图编辑器 2.0</div>
      <div class="build-meta">创建者：mzhinf · 打包日期：__SAN_EDITOR_BUILD_DATE__</div>
    </div>
    <div class="toolbar-group">
      <label>关卡</label>
      <select id="stagePicker"><option value="">当前</option></select>
    </div>
    <div class="toolbar-group">
      <input id="loadMFile" type="file" accept=".m,.dor,.stg,.ini,.dat,.txt,.xlsx,.json" multiple hidden>
      <button id="openMFile" title="导入 stageXX.m 及配套文件；完整项目可同时选择导出的 JSON 快照，迁移时再单独载入 Patch。">导入</button>
      <button id="exportFiles" class="primary">导出</button>
      <button id="exportPatch" class="secondary">Patch</button>
    </div>
    <div class="toolbar-group">
      <label>工具</label>
      <select id="tool" title="查看用于选中格子，绘制会写入当前资源。右键拖动平移地图。">
        <option value="inspect">选择</option>
        <option value="paint">笔刷</option>
      </select>
      <button id="resetView">定位</button>
      <button id="undoEdit">撤销</button>
      <button id="redoEdit">重做</button>
      <button id="resetCell">恢复图层</button>
      <button id="resetAll">清空修改</button>
    </div>
    <div class="toolbar-group" title="输入 .m 格子坐标并定位，不修改数据。">
      <label>坐标</label>
      <input id="coordX" class="coord-input" type="number" min="0" step="1" placeholder="X">
      <input id="coordY" class="coord-input" type="number" min="0" step="1" placeholder="Y">
      <button id="findCoord" type="button">搜索</button>
    </div>
    <span class="status" id="status">正在加载</span>
  </header>
  <aside class="resource-panel">
    <section class="section">
      <div class="section-title">图层控制</div>
      <div class="field"><label>当前图层</label><select id="layer"></select></div>
    </section>
    <section class="section resource-section">
      <div class="section-title">资源库</div>
      <div class="resource-controls">
        <input id="resourceFilter" placeholder="按编号过滤">
        <select id="resourceSort"><option value="index">按编号</option><option value="used">按使用数</option></select>
        <button id="clearFilter">清除</button>
      </div>
      <div class="resource-meta" id="resourceMeta"></div>
      <div class="resource-list" id="resourceList"><div class="resource-spacer" id="resourceSpacer"></div></div>
    </section>
    <section class="section collapsible-section" data-panel="data-overlays">
      <div class="section-title"><span>数据叠加显示</span><button class="panel-collapse" type="button" title="收起数据叠加显示" aria-expanded="true">−</button></div>
      <div class="collapsible-body"><div class="overlay-list" id="overlayList"></div></div>
    </section>
    <section class="section collapsible-section" data-panel="region-tools">
      <div class="section-title"><span>合成对象 / 区域操作</span><button class="panel-collapse" type="button" title="收起合成对象与区域操作" aria-expanded="true">−</button></div>
      <div class="collapsible-body">
        <div class="field"><label>复制模式</label><select id="regionCopyMode"><option value="full">全复制</option><option value="non-base">非底层复制</option></select></div>
        <div class="selection-actions">
          <button id="copyRegion" type="button">复制区域</button>
          <button id="cutRegion" type="button">剪切区域</button>
          <button id="pasteRegion" type="button">粘贴区域</button>
          <button id="saveComposite" type="button">存为对象</button>
        </div>
        <div class="hint" id="selectionInfo">未选择区域。</div>
        <div class="composite-list" id="compositeList"></div>
      </div>
    </section>
  </aside>
  <main class="canvas-zone" id="viewport">
    <div class="canvas-hud">
      <div class="hud-pill" id="hudTool">工具：选择</div>
      <div class="hud-pill" id="hudLayer">图层：-</div>
      <div class="hud-pill" id="hudSelection">格子：-</div>
      <div class="hud-pill" id="hudSite">据点：-</div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="minimap-float">
      <div class="minimap-title">小地图</div>
      <canvas id="minimap"></canvas>
    </div>
  </main>
  <aside class="inspector-panel">
    <nav class="inspector-tabs" aria-label="属性面板">
      <button class="inspector-tab active" data-tab="properties" type="button">属性</button>
      <button class="inspector-tab" data-tab="forces" type="button">势力</button>
      <button class="inspector-tab" data-tab="sites" type="button">据点</button>
      <button class="inspector-tab" data-tab="entities" type="button">武将</button>
      <button class="inspector-tab" data-tab="raw" type="button">Raw</button>
      <button class="inspector-tab" data-tab="validation" type="button">校验</button>
    </nav>
    <div class="inspector-body">
      <section class="inspector-page active" data-page="properties">
        <div class="section"><div class="section-title">选中项</div><div class="kv" id="cellInfo"></div></div>
        <div class="section"><div class="section-title">关卡</div><div class="kv" id="stageInfo"></div></div>
      </section>
      <section class="inspector-page" data-page="forces">
        <div class="section"><div class="section-title">势力管理</div><div class="manager-list" id="forceList"></div></div>
      </section>
      <section class="inspector-page" data-page="sites">
        <div class="section">
          <div class="section-title">据点 / 城门</div>
          <div class="site-tools"><select id="sitePicker"><option value="">未选据点</option></select><button id="clearSite" type="button">清除</button></div>
          <div class="kv" id="siteInfo"></div>
          <div class="site-note" id="siteNote"></div>
        </div>
      </section>
      <section class="inspector-page" data-page="entities">
        <div class="section"><div class="section-title">武将管理</div><div class="manager-list" id="entityList"></div></div>
      </section>
      <section class="inspector-page" data-page="raw">
        <div class="section"><div class="section-title"><span>字段级模型</span><button id="resetRecord" type="button">恢复当前记录</button></div><div class="record-list" id="recordList"></div></div>
      </section>
      <section class="inspector-page" data-page="validation">
        <div class="section"><div class="section-title">导出校验</div><div class="validation-list" id="validationList"></div></div>
      </section>
    </div>
  </aside>
  <footer class="bottom-dock">
    <section class="section"><div class="section-title">当前工作</div><div class="hint">选择格子后可在 Raw 中精确改字段；多选区域后可按复制模式执行复制、剪切或保存为合成对象。</div></section>
    <section class="history-section"><div class="section-title">修改记录</div><div class="patch-list" id="patchList"></div></section>
    <section class="section"><div class="section-title">状态</div><div class="field"><label>修改数量</label><input id="patchCount" value="0" readonly></div><div class="hint">导出前会检查 .m 长度、字段范围、sidecar 参考和据点联动状态。</div></section>
  </footer>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const miniCtx = mini.getContext('2d');
const LEGACY_FIELD_ALIASES = { flags: 'reserved0', word06: 'reserved0', byte08: 'terrain_tag', byte09: 'blocked', byte10: 'site_trigger', byte11: 'site_area', byte12: 'reserved1', byte13: 'minimap_color', final_palette: 'minimap_color', byte14: 'reserved2', byte15: 'reserved2' };
const DEFAULT_FIELD_META = [
  { name: 'acwx', alias: 'terrain_base', label: '地表层', editable: true, reserved: false },
  { name: 'acwy', alias: 'terrain_overlay', label: '叠加层', editable: true, reserved: false },
  { name: 'acwz', alias: 'object_overlay', label: '物件层', editable: true, reserved: false },
  { name: 'reserved0', alias: '', label: '保留字段 0', editable: false, reserved: true },
  { name: 'terrain_tag', alias: '', label: '地形标记', editable: true, reserved: false },
  { name: 'blocked', alias: '', label: '阻挡标记', editable: true, reserved: false },
  { name: 'site_trigger', alias: '', label: '据点势力范围', editable: true, reserved: false },
  { name: 'site_area', alias: '', label: '据点核心区域', editable: true, reserved: false },
  { name: 'reserved1', alias: '', label: '保留字段 1', editable: false, reserved: true },
  { name: 'minimap_color', alias: '', label: '小地图颜色（自动）', editable: false, reserved: false, derived: true, sidecarSource: true },
  { name: 'reserved2', alias: '', label: '保留字段 2', editable: false, reserved: true },
];
const EXPORT_FIELD_ORDER = DEFAULT_FIELD_META.map(entry => entry.name);

  if ((ev.ctrlKey || ev.metaKey) && !ev.altKey && !ev.shiftKey && !isEditableTarget(ev.target) && (shortcutKey === 'c' || shortcutKey === 'x' || shortcutKey === 'v')) {

    else pasteSelectedRegion();
    return;
  }

    return;

  if ((ev.ctrlKey || ev.metaKey) && (ev.key.toLowerCase() === 'y' || (ev.key.toLowerCase() === 'z' && ev.shiftKey))) {

    redoLastEdit();
    return;
